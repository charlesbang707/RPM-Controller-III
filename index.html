<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .config-row { width: 100%; max-width: 400px; display: flex; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-weight: bold; }
        .gauge-box { position: relative; width: 300px; height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gauge-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .rpm-text { font-size: 60px; font-weight: bold; margin: 0; }
        .target-text { font-size: 20px; color: #2196F3; }
        .baud-row { display: flex; gap: 10px; margin: 20px 0; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .c-btn { padding: 25px; border: none; font-size: 20px; cursor: pointer; }
        .resume { background: #4CAF50; } .up { background: #2196F3; } .stop { background: #F44336; } .down { background: #FF9800; }
        .active { border-color: #2196F3; color: #2196F3; }
    </style>
</head>
<body>
    <div class="header">
        <span id="stat" style="color:red">DISCONNECTED</span>
        <button onclick="conn()">CONNECT</button>
    </div>
    <div class="config-row">
        <select id="sa" style="flex:3"><option value="229">Source Address: 0xE5</option><option value="128">Source Address: 0x80</option></select>
        <button style="flex:1" onclick="send(document.getElementById('sa').value)">SET</button>
    </div>
    <div class="gauge-box">
        <svg class="gauge-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8"/>
            <circle id="arc" cx="50" cy="50" r="45" fill="none" stroke="#2196F3" stroke-width="8" stroke-dasharray="0 1000"/>
        </svg>
        <div id="needle" style="position:absolute; width:2px; height:120px; background:white; bottom:50%; transform-origin:bottom; transition:0.2s"></div>
        <p class="rpm-text" id="cur">0</p>
        <p class="target-text" id="tar">Target: 0</p>
    </div>
    <div class="baud-row">
        <button id="b250" class="active" onclick="send(5)">250</button>
        <button id="b500" onclick="send(6)">500</button>
    </div>
    <div class="btn-grid">
        <button class="c-btn resume" onclick="send(1)">RESUME</button>
        <button class="c-btn up" onclick="send(2)">UP</button>
        <button class="c-btn stop" onclick="send(3)">STOP</button>
        <button class="c-btn down" onclick="send(4)">DOWN</button>
    </div>
    <script>
        let char;
        async function conn() {
            const dev = await navigator.bluetooth.requestDevice({ filters:[{name:'Truck_RPM_Control'}], optionalServices:['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] });
            const srv = await dev.gatt.connect();
            const svc = await srv.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            char = await svc.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            document.getElementById('stat').innerText='CONNECTED'; document.getElementById('stat').style.color='#4CAF50';
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const d = e.target.value; const c = d.getUint16(0,true); const t = d.getUint16(2,true);
                document.getElementById('cur').innerText=c; document.getElementById('tar').innerText=`Target: ${t}`;
                document.getElementById('needle').style.transform=`rotate(${(c/3000)*270-135}deg)`;
                document.getElementById('arc').style.strokeDasharray=`${(t/3000)*283} 1000`;
            });
        }
        async function send(v) { if(char) await char.writeValue(new Uint8Array([v])); }
    </script>
</body>
</html>
